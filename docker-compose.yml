version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:6.0
    container_name: smarthome-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: smarthome
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - smarthome-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarthome-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/smarthome
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - smarthome-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smarthome-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smarthome-net

networks:
  smarthome-net:
    driver: bridge

volumes:
  mongo-data:
    driver: local
